<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Library Management System</h1>
            <p>Manage your books efficiently</p>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <span id="total-books">0</span>
                <label>Total Books</label>
            </div>
            <div class="stat">
                <span id="available-books">0</span>
                <label>Available</label>
            </div>
            <div class="stat">
                <span id="borrowed-books">0</span>
                <label>Borrowed</label>
            </div>
        </div>

        <div class="form-section">
            <h2>Add New Book</h2>
            <form id="book-form">
                <div class="form-group">
                    <input type="text" id="title" placeholder="Book Title" required>
                </div>
                <div class="form-group">
                    <input type="text" id="author" placeholder="Author Name" required>
                </div>
                <div class="form-group">
                    <input type="text" id="isbn" placeholder="ISBN (optional)">
                </div>
                <div class="form-group">
                    <select id="genre">
                        <option value="">Select Genre</option>
                        <option value="Fiction">Fiction</option>
                        <option value="Non-Fiction">Non-Fiction</option>
                        <option value="Science">Science</option>
                        <option value="Technology">Technology</option>
                        <option value="History">History</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Add Book</button>
            </form>
        </div>

        <div class="search-section">
            <input type="text" id="search" placeholder="🔍 Search by title, author, or ISBN...">
        </div>

        <div class="books-section">
            <h2>Book Collection</h2>
            <div id="books-list" class="books-grid">
                <!-- Books will be inserted here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
